name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: '34'
          ndk-version: 'r21e'

      - name: Configure Gradle
        run: |
          mkdir -p $HOME/.gradle
          cat > $HOME/.gradle/gradle.properties <<EOF
          org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
          android.useAndroidX=false
          android.enableJetifier=false
          android.suppressUnsupportedCompileSdk=33
          EOF

      - name: Build NDK (libimgui.so) via ndk-build
        run: |
          NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | sort -V | tail -1)
          echo "Using NDK: $NDK_PATH"
          ls $ANDROID_HOME/ndk/
          cd minida/minida/app/src/main/jni
          $NDK_PATH/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=Android.mk 2>&1 | tail -50
          echo "--- LIBS DIR ---"
          ls -la libs/ 2>/dev/null || ls -la
          find . -name "libimgui.so" 2>/dev/null

      - name: Generate debug keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkeypair -v \
            -keystore $HOME/.android/debug.keystore \
            -storepass android -alias androiddebugkey \
            -keypass android -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>&1 | tail -3

      - name: Build APK with Gradle
        run: |
          cd minida/minida || exit 1
          ls -la
          echo "PWD=$(pwd)"
          chmod +x gradlew
          bash -c "./gradlew clean assembleRelease --no-daemon --info -Pandroid.injected.signing.store.file=$HOME/.android/debug.keystore -Pandroid.injected.signing.store.password=android -Pandroid.injected.signing.key.alias=androiddebugkey -Pandroid.injected.signing.key.password=android" 2>&1 | tee /tmp/gradle.log | tail -300
          echo "GRADLE_EXIT=${PIPESTATUS[0]}"
          echo "--- APK SEARCH ---"
          find . -name "*.apk" 2>/dev/null
          echo "--- BUILD DIRS ---"
          find app/build -type d 2>/dev/null | head -20

      - name: Locate APK
        id: locate
        run: |
          set +e
          APK_PATH=$(find . -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK found"
            find . -name "*.apk" 2>/dev/null
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK: $APK_PATH"
          ls -la "$APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: minida-release-apk
          path: ${{ steps.locate.outputs.apk_path }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate.outputs.apk_path }}
          generate_release_notes: true
          draft: false
          prerelease: false
