name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable Gradle
        run: |
          mkdir -p $HOME/.gradle
          echo "org.gradle.jvmargs=-Xmx2g" > $HOME/.gradle/gradle.properties
          echo "android.useAndroidX=false" >> $HOME/.gradle/gradle.properties
          echo "android.enableJetifier=false" >> $HOME/.gradle/gradle.properties

      - name: Build NDK (libimgui.so)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | sort -V | tail -1)
          echo "Using NDK: $NDK_PATH"
          cd minida/app/src/main/jni
          $NDK_PATH/ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=Android.mk APP_PLATFORM=android-21
          ls -la libs/arm64-v8a/

      - name: Verify NDK output
        run: |
          ls -la minida/app/src/main/jni/libs/arm64-v8a/ || (echo "NDK build failed - no output" && exit 1)
          file minida/app/src/main/jni/libs/arm64-v8a/libimgui.so

      - name: Generate debug keystore
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p $HOME/.android
          keytool -genkeypair -v \
            -keystore $HOME/.android/debug.keystore \
            -storepass android -alias androiddebugkey \
            -keypass android -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK with Gradle
        run: |
          cd minida
          chmod +x gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            -Pandroid.injected.signing.store.file=$HOME/.android/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android

      - name: Locate APK
        id: locate
        run: |
          APK_PATH=$(find . -name "*.apk" -path "*/release/*" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK: $APK_PATH"
          ls -la "$APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: minida-release-apk
          path: ${{ steps.locate.outputs.apk_path }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate.outputs.apk_path }}
          generate_release_notes: true
          draft: false
          prerelease: false
